name: SonarQube Analysis

on:
  push:
    branches:
      - '**' # Memicu scan di SEMUA branch agar Anda bisa melihat dropdown branch-nya
  pull_request:
    branches: 
      - main

jobs:
  sonarqube-check:
    runs-on: [self-hosted, local-sonar]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Penting: fetch-depth 0 agar SonarQube bisa membaca histori branch dan menyajikan laporan "New Code" dengan akurat
          fetch-depth: 0

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npx jest --coverage
        continue-on-error: true # Melanjutkan ke proses scan meskipun test ada yang gagal, agar SonarQube tetap mendapat laporannya

      - name: SonarQube Scan & Check Quality Gate
        # Menggabungkan semua konfigurasi ke dalam satu perintah eksekusi
        # Perhatikan penggunaan karakter ">" untuk memecah perintah panjang ke baris baru agar rapi
        run: >
          npx sonar-scanner 
          -Dsonar.host.url="${{ secrets.SONAR_HOST_URL }}" 
          -Dsonar.token="${{ secrets.SONAR_TOKEN }}" 
          -Dsonar.projectKey=certificate-generator 
          -Dsonar.branch.name="${{ github.head_ref || github.ref_name }}" 
          -Dsonar.qualitygate.wait=true